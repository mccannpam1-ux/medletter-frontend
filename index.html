// Voice hook
function useVoice() {
  const [listenId, setListenId] = useState(null);
  const recRef = useRef(null);
  const supported = typeof window !== "undefined" && ("SpeechRecognition" in window || "webkitSpeechRecognition" in window);
  const start = (id, onResult) => {
    if (!supported) return;
    if (recRef.current) recRef.current.stop();
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.continuous = false; rec.interimResults = false; rec.lang = "en-GB";
    rec.onresult = e => onResult(e.results[0][0].transcript);
    rec.onend = () => setListenId(null);
    rec.onerror = () => setListenId(null);
    rec.start(); recRef.current = rec; setListenId(id);
  };
  const stop = () => { if (recRef.current) recRef.current.stop(); setListenId(null); };
  return { listenId, start, stop, supported };
}

// Field component with optional voice
function Field({ id, label, value, onChange, placeholder, type="text", voice, multiline, hint, rows=3 }) {
  const active = voice?.listenId === id;
  const appendVoice = t => onChange({ target:{ value: value ? value + " " + t : t } });
  const micBtn = voice?.supported ? (
    <button type="button" onClick={() => active ? voice.stop() : voice.start(id, appendVoice)}
      style={{position:"absolute",right:8,[multiline?"top":"top"]:"50%",marginTop:multiline?8:0,transform:multiline?"none":"translateY(-50%)",width:28,height:28,borderRadius:"50%",border:"none",cursor:"pointer",background:active?"#e53e3e":G.gl,display:"flex",alignItems:"center",justifyContent:"center",color:active?"white":G.gd,boxShadow:active?"0 0 0 3px rgba(229,62,62,0.2)":"none",zIndex:2}}>
      {active ? Icon.stop : Icon.mic}
    </button>
  ) : null;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <label style={lbl}>{label}</label>
        {active && <span style={{fontSize:10,color:"#e53e3e",fontWeight:600}}>Listening...</span>}
      </div>
      <div style={{position:"relative"}}>
        {multiline
          ? <textarea style={{...inp,minHeight:rows*36,lineHeight:1.6,resize:"vertical",paddingRight:voice?.supported?44:14}} placeholder={placeholder} value={value} onChange={onChange}/>
          : <input type={type} style={{...inp,paddingRight:voice?.supported?44:14}} placeholder={placeholder} value={value} onChange={onChange}/>
        }
        {micBtn}
      </div>
      {hint && <span style={{fontSize:11,color:G.tmu}}>{hint}</span>}
    </div>
  );
}

// Email modal
function EmailModal({ letter, typeName, patientName, doctorName, onClose }) {
  const [to, setTo] = useState(""); const [cc, setCc] = useState(""); const [note, setNote] = useState(""); const [done, setDone] = useState(false);
  const send = () => {
    const sub = encodeURIComponent(`Medical Letter: ${typeName}${patientName?" — "+patientName:""}`);
    const body = encodeURIComponent(`Dear Secretary,\n\nPlease find the ${typeName}${patientName?" for patient "+patientName:""} below, generated via MedLetter.\n\n${note?"Note: "+note+"\n\n":""}---\n\n${letter}\n\n---\n\nSincerely,\n${doctorName||"The Treating Physician"}`);
    window.open(`mailto:${encodeURIComponent(to)}?subject=${sub}${cc?"&cc="+encodeURIComponent(cc):""}&body=${body}`);
    setDone(true);
  };
  return (
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(15,45,28,0.6)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}}>

          <p style={{fontSize:12,color:"rgba(255,255,255,0.7)",margin:0}}>Opens your email client with the letter pre-filled</p>
        </div>
        {done
          ? <div style={{padding:28,textAlign:"center"}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:G.gl,display:"grid",placeItems:"center",margin:"0 auto 14px",color:G.gd}}><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg></div>
              <div style={{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:G.td,marginBottom:8}}>Email client opened</div>
              <p style={{fontSize:13,color:G.tmu,lineHeight:1.6,marginBottom:20}}>Review the letter in your email app and send when ready.</p>
              <button onClick={onClose} style={{...btnG(),borderRadius:10}}>Done</button>
            </div>
          : <div style={{padding:"18px 22px 24px",display:"flex",flexDirection:"column",gap:13}}>
              <div style={{background:G.gl,border:`1px solid ${G.gbr}`,borderRadius:8,padding:"10px 13px",fontSize:12,color:G.tm,display:"flex",gap:7,alignItems:"flex-start"}}>
                <span style={{color:G.gm,flexShrink:0,marginTop:1}}>{Icon.info}</span>

              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}><label style={lbl}>Send to (required)</label><input style={inp} type="email" placeholder="secretary@practice.com" value={to} onChange={e=>setTo(e.target.value)}/></div>

              <p style={{fontSize:13,color:G.tmu,marginBottom:20}}>Letters you generate will appear here for easy reference and reuse.</p>

            </div>
          : <div style={{display:"flex",flexDirection:"column",gap:12}}>

                <div key={i} style={{background:G.wh,border:`1.5px solid ${G.brd}`,borderRadius:12,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,flex:1,minWidth:200}}>
                    <div style={{width:36,height:36,borderRadius:8,background:G.gl,display:"grid",placeItems:"center",color:G.gd,flexShrink:0}}>{Icon.doc}</div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:G.td}}>{item.typeName}</div>
                      <div style={{fontSize:12,color:G.tmu}}>{item.patientName} · {item.date}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button style={btnO("sm")} onClick={() => { onLoad(item); setPage("app"); }}>Load</button>
                    <button style={btnO("sm")} onClick={() => { navigator.clipboard.writeText(item.letter); }}>Copy</button>
                  </div>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );
}

// Main app page
function AppPage({ setPage, user, country, history, addToHistory, loadedLetter }) {
  const C = COUNTRY[country];
  const voice = useVoice();
  const [letterType, setLetterType] = useState(loadedLetter?.letterType || C.letterTypes[0].id);
  const [form, setForm] = useState({
    patientName: loadedLetter?.patientName || "",
    dob: loadedLetter?.dob || "",
    doctorName: loadedLetter?.doctorName || user?.name || "",
    practice: loadedLetter?.practice || user?.practice || "",
    recipient: loadedLetter?.recipient || "",
    letterDate: new Date().toLocaleDateString(C.dateLocale,{day:"numeric",month:"long",year:"numeric"}),
    notes: loadedLetter?.notes || "",
    customNote: "", tone:"formal", lang:"medical",
  });
  const [loading, setLoading] = useState(false);
  const [letter, setLetter] = useState(loadedLetter?.letter || "");
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(false);
  const [showEmail, setShowEmail] = useState(false);
  const [showPlan, setShowPlan] = useState(false);
  const [showPhrases, setShowPhrases] = useState(false);

  const up = k => e => setForm(p => ({...p,[k]:e.target.value}));
  const wordCount = letter.split(/\s+/).filter(Boolean).length;

  const buildPrompt = () => {
    const tones = {formal:"formal and professional",concise:"concise and direct — no unnecessary words",detailed:"detailed and comprehensive",empathetic:"professional but warm and empathetic"};
    const langs = {medical:"Use appropriate medical terminology for a professional audience.",plain:"Use plain simple language that a non-medical person can easily understand. Avoid all jargon."};
    const typeName = C.typeNames[letterType] || "Medical Letter";
    const ctx = country==="UK"
      ? "UK medical practice. Follow NHS/UK letter conventions, British spelling, date format: DD Month YYYY."
      : "US medical practice. Follow US conventions, American spelling, reference FMLA/ADA/insurance frameworks where relevant, date format: Month DD, YYYY.";
    return `You are a senior medical secretary. Draft a complete, ready-to-send ${typeName} for a ${ctx}

Patient: ${form.patientName||"[Patient Name]"}${form.dob?` (DOB: ${form.dob})`:""}
Addressed to: ${form.recipient||"To Whom It May Concern"}
Doctor: ${form.doctorName||"The Treating Physician"}${form.practice?`, ${form.practice}`:""}
Date: ${form.letterDate}
Clinical details: ${form.notes||"[Clinical notes not provided]"}${letterType==="custom"?`\nSpecific request: ${form.customNote}`:""}
Tone: ${tones[form.tone]}
${langs[form.lang]}

Write ONLY the letter. Format: date, salutation, body paragraphs, professional closing, doctor name and credentials. Start directly with the date.`;
  };

  const generate = async () => {
    setError(""); setLetter(""); setLoading(true);
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,messages:[{role:"user",content:buildPrompt()}]})
      });
      const json = await response.json();
      if (!response.ok) throw new Error(json?.error?.message || `Error ${response.status}`);
      const text = (json.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if (!text) throw new Error("No content returned. Please try again.");
      setLetter(text);
      addToHistory({ letterType, typeName: C.typeNames[letterType], patientName: form.patientName, doctorName: form.doctorName, practice: form.practice, dob: form.dob, recipient: form.recipient, notes: form.notes, letter: text, date: new Date().toLocaleDateString(C.dateLocale,{day:"numeric",month:"long",year:"numeric"}) });
    } catch(e) { setError(e.message || "Something went wrong. Please try again."); }
    finally { setLoading(false); }
  };

  const downloadTxt = () => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([letter],{type:"text/plain"}));
    a.download = `${C.typeNames[letterType].replace(/\s/g,"-")}-${Date.now()}.txt`;
    a.click();
  };

  const printLetter = () => {
    const w = window.open("","_blank");
    w.document.write(`<!DOCTYPE html><html><head><title>${C.typeNames[letterType]}</title><style>body{font-family:Arial,sans-serif;max-width:680px;margin:60px auto;padding:0 40px;font-size:14px;line-height:1.85;color:#1a1a1a}pre{white-space:pre-wrap;font-family:Arial,sans-serif}@media print{body{margin:0}}</style></head><body><pre>${letter.replace(/&/g,"&amp;").replace(/</g,"&lt;")}</pre></body></html>`);
    w.document.close(); w.focus(); w.print();
  };

  const copyText = () => { navigator.clipboard.writeText(letter).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}); };

  return (
    <div style={{fontFamily:"system-ui,sans-serif",background:G.ow,minHeight:"100vh"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes mp{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>
      <Nav setPage={setPage} user={user}/>

      <div style={{background:G.gd,color:"white",textAlign:"center",padding:"26px 20px 22px"}}>
        <h1 style={{fontFamily:"Georgia,serif",fontSize:24,fontWeight:700,marginBottom:8}}>Medical Letter Generator</h1>
        <p style={{fontSize:13,color:"rgba(255,255,255,0.72)",margin:"0 auto",lineHeight:1.55,maxWidth:480}}>
          {country==="UK"?"Sick notes, referrals, fitness to work and more — dictate or type your clinical notes.":"Medical leave, FMLA, prior auth and more — dictate or type your clinical notes."}
        </p>
        {voice.supported && <p style={{fontSize:11,color:"rgba(255,255,255,0.55)",marginTop:8}}>Voice dictation active — select the microphone icon on any field to dictate</p>}
      </div>

      <div style={{maxWidth:760,margin:"0 auto",padding:"24px 16px 80px"}}>

        {/* Step 1 — Letter type */}
        <StepHead n="1" label="Select letter type"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:24}}>
          {C.letterTypes.map(t => (
            <button key={t.id} onClick={()=>setLetterType(t.id)} style={{background:letterType===t.id?G.gl:G.wh,border:`2px solid ${letterType===t.id?G.gd:G.brd}`,borderRadius:10,padding:"14px 12px",cursor:"pointer",textAlign:"left",fontFamily:"system-ui",boxShadow:letterType===t.id?`0 0 0 3px rgba(26,107,60,.08)`:"none"}}>
              <div style={{width:28,height:28,borderRadius:6,background:letterType===t.id?G.gd:G.gl,display:"grid",placeItems:"center",marginBottom:8,fontSize:11,fontWeight:700,color:letterType===t.id?"white":G.gm}}>
                {t.label}
              </div>
              <div style={{fontSize:12,fontWeight:600,color:G.td,marginBottom:2}}>{t.name}</div>
              <div style={{fontSize:10,color:G.tmu,lineHeight:1.35}}>{t.desc}</div>
            </button>
          ))}
        </div>

        {/* Step 2 — Details */}
        <StepHead n="2" label="Patient and clinical details" sub={voice.supported ? "— microphone icon to dictate any field" : ""}/>
        <div style={{background:G.wh,border:`1.5px solid ${G.brd}`,borderRadius:14,padding:20,marginBottom:14,boxShadow:`0 2px 10px ${G.shd}`}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <Field id="pn" label="Patient Full Name" value={form.patientName} onChange={up("patientName")} placeholder="e.g. John Smith" voice={voice}/>
            <Field id="dob" label={country==="UK"?"Date of Birth":"Date of Birth (MM/DD/YYYY)"} value={form.dob} onChange={up("dob")} placeholder={country==="UK"?"e.g. 15/03/1980":"e.g. 03/15/1980"} voice={voice}/>
            <Field id="dn" label="Doctor Name" value={form.doctorName} onChange={up("doctorName")} placeholder="e.g. Dr. Sarah Johnson" voice={voice}/>
            <Field id="pr" label={country==="UK"?"Practice / Hospital":"Clinic / Hospital"} value={form.practice} onChange={up("practice")} placeholder={country==="UK"?"e.g. City Medical Centre":"e.g. Riverside Family Practice"} voice={voice}/>
            <Field id="re" label="Letter Addressed To" value={form.recipient} onChange={up("recipient")} placeholder="e.g. To Whom It May Concern" voice={voice}/>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={lbl}>Letter Date</label>
              <input style={inp} value={form.letterDate} onChange={up("letterDate")}/>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                <label style={lbl}>Clinical Notes and Key Details</label>
                <button onClick={()=>setShowPhrases(!showPhrases)} style={{fontSize:11,color:G.gm,background:"transparent",border:"none",cursor:"pointer",fontWeight:600,padding:0}}>
                  {showPhrases?"Hide quick phrases":"Quick phrases"}
                </button>
              </div>
              {showPhrases && (
                <div style={{background:G.gl,border:`1px solid ${G.gbr}`,borderRadius:8,padding:"10px 12px",marginBottom:10,display:"flex",flexWrap:"wrap",gap:6}}>
                  {C.quickPhrases.map((ph,i) => (
                    <button key={i} onClick={() => setForm(p=>({...p,notes:p.notes?(p.notes+" "+ph):ph}))}
                      style={{background:G.wh,border:`1px solid ${G.gbr}`,borderRadius:20,padding:"4px 12px",fontSize:11,color:G.tm,cursor:"pointer",fontFamily:"system-ui"}}>
                      + {ph.length>40?ph.slice(0,40)+"...":ph}
                    </button>
                  ))}
                </div>
              )}
              <div style={{position:"relative"}}>
                <textarea style={{...inp,minHeight:90,lineHeight:1.6,resize:"vertical",paddingRight:voice.supported?44:14}}
                  placeholder={country==="UK"?"e.g. Patient has acute lower back pain since 3 April. Unable to perform manual duties. Expected recovery 2-3 weeks.":"e.g. Patient has acute lumbar pain since April 3rd. Unable to perform manual duties. ICD-10: M54.5. Expected recovery 2-3 weeks."}
                  value={form.notes} onChange={up("notes")}/>
                {voice.supported && (
                  <button type="button" onClick={() => voice.listenId==="no" ? voice.stop() : voice.start("no", t=>setForm(p=>({...p,notes:p.notes?p.notes+" "+t:t})))}
                    style={{position:"absolute",right:8,top:10,width:28,height:28,borderRadius:"50%",border:"none",cursor:"pointer",background:voice.listenId==="no"?"#e53e3e":G.gl,display:"flex",alignItems:"center",justifyContent:"center",color:voice.listenId==="no"?"white":G.gd}}>
                    {voice.listenId==="no"?Icon.stop:Icon.mic}
                  </button>
                )}
              </div>
              <div style={{fontSize:11,color:G.tmu,marginTop:4}}>Include diagnosis, duration, restrictions and expected recovery. More detail = better letter.</div>
            </div>
            {letterType==="custom" && (
              <div style={{gridColumn:"1/-1"}}>
                <Field id="cn" label="Describe What You Need" value={form.customNote} onChange={up("customNote")} placeholder="e.g. A letter explaining why my patient requires workplace adjustments due to their medical condition..." voice={voice} multiline/>
              </div>
            )}
          </div>
        </div>

        {/* Step 3 — Tone + Signature builder */}
        <StepHead n="3" label="Tone, language and signature"/>
        <div style={{background:G.wh,border:`1.5px solid ${G.brd}`,borderRadius:14,padding:20,marginBottom:20,boxShadow:`0 2px 10px ${G.shd}`}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={lbl}>Tone</label>
              <select style={inp} value={form.tone} onChange={up("tone")}>
                <option value="formal">Formal and Professional</option>
                <option value="concise">Concise and Direct</option>
                <option value="detailed">Detailed and Comprehensive</option>
                <option value="empathetic">Empathetic and Supportive</option>
              </select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={lbl}>Language Level</label>
              <select style={inp} value={form.lang} onChange={up("lang")}>
                <option value="medical">Medical Professional (for colleagues)</option>
                <option value="plain">Plain Language (for patients and employers)</option>
              </select>
            </div>
          </div>
          {/* Signature builder */}
          <div style={{background:G.gl,border:`1px solid ${G.gbr}`,borderRadius:8,padding:"12px 14px"}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.9px",color:G.tmu,marginBottom:10}}>Signature Block</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field id="sig_name" label="Full Name and Title" value={form.doctorName} onChange={up("doctorName")} placeholder="Dr. Sarah Johnson" voice={voice}/>
              <Field id="sig_cred" label="Credentials (optional)" value={form.credentials||""} onChange={e=>setForm(p=>({...p,credentials:e.target.value}))} placeholder={country==="UK"?"e.g. MBBS, MRCGP":"e.g. MD, FAAFP"} voice={voice}/>
            </div>
          </div>
        </div>

        {/* Generate */}
        <button onClick={generate} disabled={loading} style={{width:"100%",padding:16,background:loading?G.gm:G.gd,border:"none",borderRadius:12,color:"white",fontFamily:"system-ui",fontSize:15,fontWeight:600,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,opacity:loading?0.85:1}}>
          {loading && <span style={{width:16,height:16,border:"2px solid rgba(255,255,255,0.3)",borderTop:"2px solid white",borderRadius:"50%",display:"inline-block",animation:"spin 0.65s linear infinite"}}/>}
          {loading?"Generating letter...":"Generate Letter"}
        </button>

        {/* Clinical review checkbox - shown after generation */}
        {letter && (
          <div style={{marginTop:14,padding:"12px 16px",background:reviewed?"#f0faf5":"#fffbeb",border:`1.5px solid ${reviewed?G.gbr:"#fde68a"}`,borderRadius:10,display:"flex",alignItems:"flex-start",gap:12,transition:"all 0.2s"}}>
            <input type="checkbox" id="reviewed" checked={reviewed} onChange={e=>setReviewed(e.target.checked)} style={{width:18,height:18,accentColor:G.gd,marginTop:1,flexShrink:0,cursor:"pointer"}}/>
            <label htmlFor="reviewed" style={{fontSize:13,color:G.td,lineHeight:1.55,cursor:"pointer"}}>
              <strong>I have reviewed this letter</strong> and confirm it is clinically accurate and appropriate to send. I understand I remain professionally responsible for all patient correspondence.
            </label>
          </div>
        )}

        {error && (
          <div style={{marginTop:12,padding:"12px 14px",background:"#fff5f5",border:`1.5px solid #fca5a5`,borderRadius:8,color:G.red,fontSize:13,display:"flex",gap:8,alignItems:"flex-start"}}>
            <span style={{flexShrink:0,marginTop:1}}>{Icon.warn}</span>{error}
          </div>
        )}

        {/* Output */}
        {letter && (
          <div style={{marginTop:28}}>
            {/* Toolbar */}
            <div style={{background:G.wh,border:`1.5px solid ${G.gbr}`,borderRadius:12,padding:"12px 16px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,boxShadow:`0 2px 10px ${G.shd}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,color:G.gd}}>
                  <span style={{width:7,height:7,borderRadius:"50%",background:G.gb,boxShadow:`0 0 8px ${G.gb}`,display:"inline-block"}}/>
                  Letter ready
                </div>
                <span style={{fontSize:11,color:G.tmu,background:G.gl,borderRadius:12,padding:"2px 8px"}}>{wordCount} words</span>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <button onClick={copyText} style={btnO("sm")}>{copied?Icon.check:Icon.copy} {copied?"Copied":"Copy"}</button>
                <button onClick={downloadTxt} style={btnO("sm")}>{Icon.dl} Download</button>
                <button onClick={printLetter} style={btnO("sm")}>{Icon.print} Print</button>
                <button onClick={()=>setShowEmail(true)} style={btnG("sm")}>{Icon.mail} Email</button>
              </div>
            </div>

            {/* Info strip */}
            <div style={{background:G.gl,border:`1px solid ${G.gbr}`,borderRadius:8,padding:"9px 14px",fontSize:12,color:G.tm,marginBottom:12,lineHeight:1.55}}>
              Save as a text file to paste into your EHR, print directly, or use Email to send to your secretary for filing.
            </div>

            {/* Letter preview */}
            <div style={{background:G.wh,border:`1.5px solid ${G.gbr}`,borderRadius:14,overflow:"hidden",boxShadow:`0 4px 24px ${G.shd}`}}>
              <div style={{background:G.gd,padding:"10px 18px",display:"flex",alignItems:"center",gap:8}}>
                {[0.2,0.35,0.55].map((op,i)=><span key={i} style={{width:9,height:9,borderRadius:"50%",background:`rgba(255,255,255,${op})`,display:"inline-block"}}/>)}
                <span style={{marginLeft:6,fontSize:11,color:"rgba(255,255,255,0.7)",fontWeight:500}}>{C.typeNames[letterType]} — {form.patientName||"Patient"}</span>
              </div>
              <div style={{padding:"28px 30px"}}>
                <pre style={{fontFamily:"system-ui,sans-serif",fontSize:14,lineHeight:1.9,color:G.gd,whiteSpace:"pre-wrap",margin:0,fontWeight:400}}>{letter}</pre>
              </div>
            </div>

            {/* Disclaimer */}
            <div style={{marginTop:14,padding:"12px 16px",background:"#fffbeb",border:`1.5px solid #fde68a`,borderRadius:10,fontSize:12,color:"#92400e",lineHeight:1.6,display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{flexShrink:0,marginTop:1}}>{Icon.warn}</span>
              <div><strong>Review before sending.</strong> This is an AI-generated draft. You remain clinically and legally responsible for all patient correspondence.</div>
            </div>
          </div>
        )}
      </div>

      {showEmail && <EmailModal letter={letter} typeName={C.typeNames[letterType]} patientName={form.patientName} doctorName={form.doctorName} onClose={()=>setShowEmail(false)}/>}
      {showPlan && <PlanModal onClose={()=>setShowPlan(false)} country={country}/>}
    </div>
  );
}

          <span style={{width:40}}/>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,marginBottom:4}}>Start your free trial</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.75)",marginBottom:14}}>15 days free · No credit card required</div>

// Root
export default function MedLetter() {
  const [page, setPage] = useState("land");
  const [user, setUser] = useState(null);
  const [country, setCountry] = useState("UK");
  const [history, setHistory] = useState([]);
  const [loadedLetter, setLoadedLetter] = useState(null);

  const go = useCallback(p => { setPage(p); window.scrollTo(0,0); }, []);
  const setU = useCallback(u => setUser(u), []);
  const setC = useCallback(c => setCountry(c), []);
  const addToHistory = useCallback(item => setHistory(h => [item, ...h.slice(0,19)]), []);
  const loadLetter = useCallback(item => setLoadedLetter(item), []);

  if (page === "land")    return <Landing    setPage={go} country={country} setCountry={setC} />;
  if (page === "login")   return <Login      setPage={go} setUser={setU} country={country} setCountry={setC} />;
  if (page === "signup")  return <Signup     setPage={go} setUser={setU} country={country} setCountry={setC} />;
  if (page === "app")     return <AppPage    setPage={go} user={user} country={country} history={history} addToHistory={addToHistory} loadedLetter={loadedLetter} />;
  if (page === "history") return <HistoryPage setPage={go} history={history} onLoad={loadLetter} />;
  return <Landing setPage={go} country={country} setCountry={setC} />;
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(MedLetter));
  </script>
</body>
